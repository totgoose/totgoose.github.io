<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ТОТ ЕЩЁ ГУСЬ | ГАСТРОКАФЕ</title>
<style>
/* General Container */
.wl-container {
    font-family: 'Georgia', 'Times New Roman', serif;
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
    color: #333;
    background-color: #fff;
    line-height: 1.5;
    box-sizing: border-box;
}

/* Typography */
.wl-main-title {
    text-align: center;
    font-size: 36px;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 40px;
    color: #000;
    border-bottom: 2px solid #8b0000;
    padding-bottom: 20px;
}

.wl-section-title {
    font-size: 24px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 50px;
    margin-bottom: 50px;
    color: #8b0000;
    text-align: center;
    font-weight: 600;
}

/* Map Container - iOS Fix */
.map-wrapper-outer {
    position: relative;
    width: 100%;
    height: 250px;
    overflow: hidden;
    border-radius: 16px;
    margin-top: 25px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
    -webkit-transform: translateZ(0);
}

.map-container {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 100%;
    max-height: 250px;
    overflow: hidden;
}

.map-inner {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    min-width: 100%;
    min-height: 100%;
    filter: brightness(0.7) contrast(1.1) saturate(0.8) hue-rotate(180deg) invert(1);
}

iframe {
    width: 100%;
    height: 100%;
    min-height: 250px;
    border: none;
    display: block;
    width: 1px;
    min-width: 100%;
    *width: 100%;
}

/* Navigation links default (desktop) */
.nav-links {
    display: inline;
}

/* Contacts default (desktop) */
.contact-links {
    display: inline;
}

/* Responsive */
@media (max-width: 600px) {
    .wl-container {
        padding: 15px;
    }
    
    .wl-main-title { 
        font-size: 24px; 
        letter-spacing: 1px;
        margin-bottom: 20px;
        padding-bottom: 15px;
        /* Stack menu items vertically */
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    
    /* Hide separators on mobile */
    .wl-main-title .separator {
        display: none;
    }
    
    .wl-section-title { 
        font-size: 18px; 
        margin-top: 30px;
        margin-bottom: 30px;
        /* Stack contact items vertically */
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    
    /* Hide separators in contacts on mobile */
    .wl-section-title .separator {
        display: none;
    }
    
    .map-wrapper-outer {
        height: 200px;
        margin-top: 20px;
        border-radius: 12px;
    }
    
    .map-container {
        max-height: 200px;
    }
    
    iframe {
        min-height: 200px;
    }
}

@media (max-width: 375px) {
    .wl-main-title {
        font-size: 20px;
    }
    
    .map-wrapper-outer {
        height: 180px;
    }
    
    .map-container {
        max-height: 180px;
    }
    
    iframe {
        min-height: 180px;
    }
}
</style>
<link rel="icon" href="/img/favicon.ico" type="image/x-icon">
</head>
<body>

<div class="wl-container">
    <img src="/img/goose.png" alt="Гусь" style="display: block; margin: 0 auto 20px auto; max-width: 200px; height: auto;">
    
    <h1 class="wl-main-title">
        <a href="menu.html" target="_blank" style="color:inherit;text-decoration:none;">МЕНЮ</a>
        <span class="separator">|</span>
        <a href="menu_dinner.html" target="_blank" style="color:inherit;text-decoration:none;">БИЗНЕС-ЛАНЧ</a>
        <span class="separator">|</span>
        <a href="wines.html" target="_blank" style="color:inherit;text-decoration:none;">ВИННАЯ КАРТА</a>
    </h1>

    <!-- Map with iOS fixes -->
    <div class="map-wrapper-outer">
        <div class="map-container">
            <div class="map-inner">
                <iframe src="https://yandex.ru/map-widget/v1/?um=constructor%3Af6acc35f39f04314ae5135916ccc71a32f937ef470795668349455d8c92847f9&amp;source=constructor"
                    scrolling="no" 
                    frameborder="0"
                    allowfullscreen="">
                </iframe>
            </div>
        </div>
    </div>

    <div class="wl-section-title">
        <a href="https://yandex.ru/maps/org/tot_yeshchyo_gus/240625638253/" target="_blank" style="color:inherit;text-decoration:none;">ВАЛОВАЯ 26</a>
        <span class="separator">|</span>
        <a href="tel:+79999262688" target="_blank" style="color:inherit;text-decoration:none;">+ 7 (9999) 26-26-88</a>
        <span class="separator">|</span>
        <a href="https://totgoose.ru" target="_blank" style="color:inherit;text-decoration:none;">TOTGOOSE.RU</a>
    </div>
</div>

</body>
</html>
