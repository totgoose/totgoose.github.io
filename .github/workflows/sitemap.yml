name: Generate sitemap.xml

on:
  push:
    branches: [main, master]          # или твоя основная ветка
  pull_request:
    branches: [main, master]
  workflow_dispatch:                  # чтобы можно было запустить вручную

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0                # важно! нужны все коммиты для <lastmod>

      - name: Generate sitemap.xml
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://username.github.io/repo-name/     # ← измени на свой адрес!
          # или если сайт на кастомном домене: https://www.example.com/
          # или если сайт в подпапке: https://username.github.io/repo-name/subfolder/

          # Дополнительно (по желанию):
          path-to-robots-txt: robots.txt                 # если есть
          sitemap-format: xml                            # или txt
          # additional-extensions: pdf,docx               # если нужно включить не только .html
          # exclude: "**/private/**, **/admin/**"         # glob-паттерны исключения

      - name: Commit and push sitemap.xml (если изменился)
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git add sitemap.xml || true
          if git diff --staged --quiet; then
            echo "sitemap.xml не изменился — пропускаем коммит"
          else
            git commit -m "chore: update sitemap.xml [ci skip]"
            git push
          fi
